server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:js|css|mp3|woff2?|ttf|otf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
